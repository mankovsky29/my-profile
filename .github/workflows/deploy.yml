name: Build and Secure Deploy Portfolio to Synology

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout the repository code
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Set up Node.js environment
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    # 3. Install dependencies and build production static files
    - name: Install and Build React App
      run: |
        npm install
        npm run build 

    # 4. Connect the cloud VM directly to your private Tailscale network
    - name: Connect to Tailscale
      uses: tailscale/github-action@v3
      with:
        oauth-client-id: ${{ secrets.TAILSCALE_CLIENT_ID }}
        oauth-secret: ${{ secrets.TAILSCALE_CLIENT_SECRET }}
        tags: tag:ci

    # 5. Securely copy files natively via Node (Shares the Tailscale tunnel)
    - name: Deploy to Synology NAS via SFTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.NAS_TAILSCALE_IP }}
        username: ${{ secrets.NAS_USERNAME }}
        password: ${{ secrets.NAS_PASSWORD }}
        port: 22
        protocol: sftp
        local-dir: ./dist/   # Ensure this matches your build directory (e.g., ./build/ or ./dist/)
        server-dir: /volume1/web/portfolio/