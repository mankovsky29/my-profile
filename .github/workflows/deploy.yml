name: Build and Secure Deploy Portfolio to Synology

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout the repository code
    - name: Checkout Code
      uses: actions/checkout@v4

    # 2. Set up Node.js environment
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    # 3. Install dependencies and build production static files
    - name: Install and Build React App
      run: |
        npm install
        npm run build 

# 4. Connect the cloud VM directly to your private Tailscale network
    - name: Connect to Tailscale
      uses: tailscale/github-action@v3
      with:
        oauth-client-id: ${{ secrets.TAILSCALE_CLIENT_ID }}
        oauth-secret: ${{ secrets.TAILSCALE_CLIENT_SECRET }}
        tags: tag:ci
        override-local-dns: true # Forces the VM to instantly respect Tailscale routes

# 4.5 Network Diagnostics (Temporary debugging step)
    - name: Diagnose Network Connection to NAS
      run: |
        ping -c 3 ${{ secrets.NAS_TAILSCALE_IP }} || echo "Ping failed"
        nc -zv -w 5 ${{ secrets.NAS_TAILSCALE_IP }} 22 || echo "Port 22 is closed/unreachable"

# 5. Securely copy files natively via SSH/SFTP (Inherits the Tailscale tunnel)
    - name: Deploy to Synology NAS via SFTP
      uses: appleboy/scp-action@v1
      with:
        host: ${{ secrets.NAS_TAILSCALE_IP }}
        username: ${{ secrets.NAS_USERNAME }}
        password: ${{ secrets.NAS_PASSWORD }}
        port: 22
        source: "dist/*"                     # The local files to copy
        target: "/volume1/web/portfolio"      # The target path on your NAS
        strip_components: 1                  # Prevents creating a literal "dist" folder inside "portfolio"
        overwrite: true                      # Overwrites existing static assets                # Overwrites existing static assets