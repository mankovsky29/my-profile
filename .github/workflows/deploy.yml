name: Build and Secure Deploy Portfolio to Synology

# This dictates when the pipeline runs. In this case, whenever you push code to 'main'
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest # Tells GitHub to give us a clean, free Ubuntu cloud VM

    steps:
    # Step 1: Clone your repository onto the cloud VM
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: Install Node.js so we can run npm commands
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'

    # Step 3: Install dependencies and build your static web files
    - name: Install and Build React App
      run: |
        npm install
        npm run build 

    # Step 4: Connect the cloud VM directly to your private Tailscale network
    - name: Connect to Tailscale
      uses: tailscale/github-action@v3
      with:
        oauth-client-id: ${{ secrets.TAILSCALE_CLIENT_ID }}
        oauth-secret: ${{ secrets.TAILSCALE_CLIENT_SECRET }}
        tags: tag:ci

    # Step 5: Securely copy the files directly to your home NAS over the VPN
    - name: Deploy to Synology NAS via SFTP
      uses: wlixcc/SFTP-Deploy-Action@v1.2.6
      with:
        server: ${{ secrets.NAS_TAILSCALE_IP }}
        port: 22 
        username: ${{ secrets.NAS_USERNAME }}
        password: ${{ secrets.NAS_PASSWORD }} 
        local_path: './dist/*'  # Change to './build/*' if your project builds into a 'build' folder
        remote_path: '/volume1/web/portfolio' # The absolute path on your Synology NAS filesystem
        delete_remote_files: false